<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>御盟集團 YUIMOM GROUP — 高雄頂級物件</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400;500;600;700;900&family=Noto+Sans+TC:wght@100;200;300;400;500&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#070D3D;--navy-90:rgba(7,13,61,0.92);--navy-light:#0e1654;
  --gold:#c5a059;--gold-dim:rgba(197,160,89,0.35);
  --white:#f5f4f0;--off-white:#e8e6e1;--pale:#ccc;--silver:#a8a8b0;--steel:#7a7a88;
  --serif:'Noto Serif TC','Cormorant Garamond',serif;
  --sans:'Noto Sans TC',sans-serif;
  --eng:'Cormorant Garamond',serif;
  --ease:cubic-bezier(0.16,1,0.3,1);--ease-out:cubic-bezier(0.22,0.61,0.36,1);
}
html{scroll-behavior:smooth;font-size:18px;background:var(--navy)}
body{font-family:var(--sans);background:var(--navy);color:var(--pale);overflow-x:hidden;-webkit-font-smoothing:antialiased}
::selection{background:var(--gold);color:var(--navy)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--navy)}
::-webkit-scrollbar-thumb{background:var(--gold-dim)}

/* ═══ NAV ═══ */
.nav{position:fixed;top:0;left:0;right:0;z-index:9999;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(20px,5vw,80px);height:68px;background:rgba(7,13,61,0.55);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border-bottom:1px solid rgba(197,160,89,0.06);transition:all 0.6s var(--ease)}
.nav.scrolled{background:var(--navy-90);border-bottom-color:rgba(197,160,89,0.12)}
.nav-logo{height:56px;width:auto;object-fit:contain;cursor:pointer;opacity:0.92;transition:opacity 0.3s;flex-shrink:0}
.nav-logo:hover{opacity:1}
.nav-right{display:flex;align-items:center;gap:0}
.nav-links{display:flex;gap:0;align-items:center}
.nav-link{font-family:var(--sans);font-size:18px;font-weight:300;letter-spacing:0.18em;color:rgba(200,200,210,0.45);text-decoration:none;padding:24px 18px;position:relative;cursor:pointer;transition:color 0.5s var(--ease)}
.nav-link:hover,.nav-link.active{color:var(--gold)}
.nav-link::after{content:'';position:absolute;bottom:20px;left:50%;width:0;height:1px;background:var(--gold);transform:translateX(-50%);transition:width 0.6s var(--ease)}
.nav-link.active::after{width:18px}
.lang-btn{font-family:var(--eng);font-size:18px;font-weight:400;letter-spacing:0.15em;color:var(--gold);background:none;border:1px solid rgba(197,160,89,0.2);padding:6px 14px;cursor:pointer;margin-left:12px;transition:all 0.4s var(--ease);white-space:nowrap}
.lang-btn:hover{background:rgba(197,160,89,0.08);border-color:var(--gold)}
.nav-toggle{display:none;flex-direction:column;gap:6px;cursor:pointer;padding:10px}
.nav-toggle span{display:block;width:22px;height:1px;background:var(--gold);transition:all 0.4s var(--ease)}
.nav-toggle.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.nav-toggle.open span:nth-child(2){opacity:0}
.nav-toggle.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
@media(max-width:768px){
  .nav-toggle{display:flex}
  .nav-right{position:fixed;top:68px;left:0;right:0;flex-direction:column;background:var(--navy-90);backdrop-filter:blur(32px);padding:10px 0 20px;transform:translateY(-120%);transition:transform 0.5s var(--ease);border-bottom:1px solid rgba(197,160,89,0.08)}
  .nav-right.open{transform:translateY(0)}
  .nav-links{flex-direction:column;width:100%}
  .nav-link{padding:16px 30px;width:100%}
  .lang-btn{margin:10px 30px 0;align-self:flex-start}
}

/* ═══ HERO ═══ */
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:100px clamp(24px,8vw,120px) 60px;overflow:hidden;background:var(--navy)}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 35%,rgba(197,160,89,0.04) 0%,transparent 65%);pointer-events:none}
.hero::after{content:'';position:absolute;inset:0;opacity:0.025;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.hero-logo{height:180px;width:auto;object-fit:contain;margin-bottom:40px;opacity:0;animation:fadeIn 1.2s 0.3s var(--ease) forwards}
.hero-line{width:1px;height:50px;background:linear-gradient(180deg,transparent,var(--gold-dim),transparent);margin-bottom:36px;opacity:0;animation:fadeIn 1.5s 0.5s var(--ease) forwards}
.hero-overline{font-family:var(--sans);font-size:0.72rem;font-weight:200;letter-spacing:0.8em;color:var(--gold);margin-bottom:32px;opacity:0;transform:translateY(15px);animation:revealUp 1.2s 0.7s var(--ease) forwards}
.hero-title{font-family:var(--serif);font-size:clamp(2.6rem,7vw,5.4rem);font-weight:200;line-height:1.55;letter-spacing:0.18em;color:var(--white);margin-bottom:24px;opacity:0;transform:translateY(25px);animation:revealUp 1.4s 0.9s var(--ease) forwards}
.hero-title .accent{color:var(--gold);font-weight:400;text-shadow:0 0 80px rgba(197,160,89,0.12)}
.hero-sub{font-family:var(--sans);font-size:0.95rem;font-weight:200;letter-spacing:0.12em;line-height:2.3;color:var(--off-white);max-width:500px;margin-bottom:72px;opacity:0;transform:translateY(15px);animation:revealUp 1.2s 1.1s var(--ease) forwards}
.hero-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;width:100%;max-width:1200px;opacity:0;transform:translateY(30px);animation:revealUp 1.4s 1.3s var(--ease) forwards}
@media(max-width:900px){.hero-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.hero-grid{grid-template-columns:1fr}}
.hero-card{position:relative;aspect-ratio:3/4;overflow:hidden;cursor:pointer}
.hero-card img{width:100%;height:100%;object-fit:cover;filter:brightness(0.55) saturate(0.8);transition:all 1.8s var(--ease)}
.hero-card:hover img{filter:brightness(0.75) saturate(0.95);transform:scale(1.05)}
.hero-card-content{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:28px 24px;background:linear-gradient(180deg,transparent 45%,rgba(7,13,61,0.55) 100%)}
.hero-card .card-num{font-family:var(--eng);font-size:0.75rem;font-weight:300;letter-spacing:0.5em;color:var(--gold-dim);margin-bottom:auto}
.hero-card .card-stat{font-family:var(--eng);font-size:2.6rem;font-weight:300;color:var(--gold);letter-spacing:0.03em;line-height:1;margin-bottom:4px}
.hero-card .card-unit{font-family:var(--sans);font-size:0.7rem;font-weight:200;letter-spacing:0.35em;color:var(--silver)}
.hero-card .card-title{font-family:var(--serif);font-size:1.15rem;font-weight:400;letter-spacing:0.15em;color:var(--white);margin-top:6px;transition:color 0.5s}
.hero-card:hover .card-title{color:var(--gold)}
.scroll-ind{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:10px;opacity:0;animation:fadeIn 1s 2.2s var(--ease) forwards}
.scroll-ind span{font-size:0.62rem;letter-spacing:0.5em;color:rgba(200,200,210,0.2);font-weight:200}
.scroll-pulse{width:1px;height:45px;background:linear-gradient(180deg,var(--gold-dim),transparent);animation:scrollPulse 2.5s ease-in-out infinite}

/* ═══ PROPERTY SECTIONS ═══ */
.property-section{display:none;opacity:0;transition:opacity 0.6s var(--ease)}
.property-section.active{display:block}
.property-section.visible{opacity:1}
.prop-hero{position:relative;width:100%;height:100vh;min-height:580px;overflow:hidden;margin-top:68px}
.prop-hero-img{position:absolute;inset:-10%;width:120%;height:120%;object-fit:cover;filter:brightness(0.55) saturate(0.85) contrast(1.05);transition:transform 0.1s linear}
.prop-hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(7,13,61,0.15) 0%,rgba(7,13,61,0.05) 30%,rgba(7,13,61,0.35) 65%,rgba(7,13,61,0.88) 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:0 clamp(30px,8vw,120px) clamp(60px,10vh,120px)}
.prop-overline{font-family:var(--sans);font-size:0.68rem;font-weight:200;letter-spacing:0.7em;color:var(--gold);margin-bottom:18px}
.prop-title{font-family:var(--serif);font-size:clamp(2.4rem,5.5vw,4rem);font-weight:200;letter-spacing:0.22em;color:var(--white);margin-bottom:14px;line-height:1.3;text-shadow:0 2px 20px rgba(7,13,61,0.5)}
.prop-tagline{font-family:var(--sans);font-size:0.92rem;font-weight:200;letter-spacing:0.15em;color:var(--off-white);max-width:480px;text-shadow:0 1px 10px rgba(7,13,61,0.4)}
.prop-hero-stat{position:absolute;right:clamp(30px,8vw,120px);bottom:clamp(60px,10vh,120px);text-align:right}
.prop-hero-stat .big-num{font-family:var(--eng);font-size:clamp(5rem,12vw,10rem);font-weight:300;color:rgba(197,160,89,0.45);line-height:0.85;letter-spacing:-0.02em;text-shadow:0 2px 30px rgba(7,13,61,0.6)}
.prop-hero-stat .big-unit{font-family:var(--sans);font-size:0.85rem;font-weight:300;letter-spacing:0.4em;color:rgba(197,160,89,0.5);margin-top:10px}
@media(max-width:768px){.prop-hero-stat{display:none}}
.prop-body{background:var(--navy)}

/* ═══ SHARED COMPONENTS ═══ */
.stats-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));border-top:1px solid rgba(197,160,89,0.1);border-bottom:1px solid rgba(197,160,89,0.1)}
.stat-cell{padding:44px 20px;text-align:center;border-right:1px solid rgba(197,160,89,0.05)}
.stat-cell:last-child{border-right:none}
.stat-cell .stat-num{font-family:var(--eng);font-size:2.8rem;font-weight:300;color:var(--gold);letter-spacing:0.04em;line-height:1;margin-bottom:10px}
.stat-cell .stat-label{font-family:var(--sans);font-size:0.72rem;font-weight:200;letter-spacing:0.3em;color:var(--steel);text-transform:uppercase}
.invite-block{display:grid;grid-template-columns:1fr 1fr;min-height:70vh}
@media(max-width:768px){.invite-block{grid-template-columns:1fr;min-height:auto}}
.invite-image{position:relative;overflow:hidden;min-height:380px}
.invite-image img{position:absolute;inset:-6%;width:112%;height:112%;object-fit:cover;filter:brightness(0.65) saturate(0.8);transition:transform 0.1s linear}
.invite-text{display:flex;flex-direction:column;justify-content:center;padding:clamp(36px,5vw,72px) clamp(28px,4vw,64px);background:var(--navy-light);position:relative}
.invite-text::before{content:'';position:absolute;top:0;left:0;width:1px;height:100%;background:linear-gradient(180deg,transparent,var(--gold-dim),transparent)}
.invite-label{font-family:var(--sans);font-size:0.68rem;font-weight:200;letter-spacing:0.6em;color:var(--gold);margin-bottom:24px}
.invite-heading{font-family:var(--serif);font-size:clamp(1.35rem,2.5vw,1.85rem);font-weight:300;letter-spacing:0.1em;line-height:1.9;color:var(--off-white);margin-bottom:22px}
.invite-body{font-family:var(--sans);font-size:0.92rem;font-weight:200;line-height:2.2;color:var(--silver);letter-spacing:0.03em}
.highlights-section{padding:72px clamp(28px,5vw,90px);max-width:1200px;margin:0 auto}
.highlights-title{font-family:var(--sans);font-size:0.68rem;font-weight:200;letter-spacing:0.6em;color:var(--gold);margin-bottom:36px}
.hl-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid rgba(255,255,255,0.03)}
@media(max-width:640px){.hl-grid{grid-template-columns:1fr}}
.hl-item{padding:16px 0 16px 22px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:0.9rem;font-weight:200;line-height:1.8;color:var(--silver);position:relative;transition:color 0.4s}
.hl-item:hover{color:var(--gold)}
.hl-item::before{content:'';position:absolute;left:0;top:50%;width:10px;height:1px;background:var(--gold-dim);transition:width 0.4s var(--ease),background 0.4s}
.hl-item:hover::before{width:15px;background:var(--gold)}
.gallery-full{display:grid;grid-template-columns:1fr 1fr;gap:2px}
@media(max-width:640px){.gallery-full{grid-template-columns:1fr}}
.gallery-full img{width:100%;height:340px;object-fit:cover;filter:brightness(0.6) saturate(0.75);transition:filter 1s var(--ease)}
.gallery-full img:hover{filter:brightness(0.8) saturate(0.9)}
.cta-section{text-align:center;padding:72px 24px;background:var(--navy-light);border-top:1px solid rgba(197,160,89,0.06);border-bottom:1px solid rgba(197,160,89,0.06)}
.cta-section .cta-label{font-family:var(--sans);font-size:0.68rem;font-weight:200;letter-spacing:0.6em;color:var(--gold);margin-bottom:22px}
.cta-section .cta-phone{font-family:var(--eng);font-size:clamp(1.8rem,3.5vw,2.6rem);font-weight:300;letter-spacing:0.2em;color:var(--white);margin-bottom:10px;text-decoration:none;display:block;transition:color 0.4s var(--ease)}
.cta-section .cta-phone:hover{color:var(--gold)}
.cta-actions{display:flex;align-items:center;justify-content:center;gap:16px;margin:20px 0 14px;flex-wrap:wrap}
.cta-line{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--sans);font-size:0.78rem;font-weight:300;letter-spacing:0.15em;color:var(--white);text-decoration:none;background:#06C755;padding:12px 28px;border-radius:6px;transition:all 0.4s var(--ease);min-width:200px}
.cta-line:hover{background:#05b34c;transform:translateY(-2px);box-shadow:0 6px 24px rgba(6,199,85,0.25)}
.cta-line svg{width:22px;height:22px;flex-shrink:0}
.cta-tel{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--eng);font-size:0.88rem;font-weight:400;letter-spacing:0.15em;color:var(--gold);text-decoration:none;border:1px solid rgba(197,160,89,0.2);padding:12px 28px;border-radius:6px;transition:all 0.4s var(--ease);min-width:200px}
.cta-tel:hover{border-color:var(--gold);background:rgba(197,160,89,0.06);transform:translateY(-2px)}
.cta-tel svg{width:18px;height:18px;flex-shrink:0}
/* ═══ PDF DOWNLOAD BAR ═══ */
.pdf-bar{display:flex;align-items:center;justify-content:center;gap:20px;padding:28px 24px;background:rgba(7,13,61,0.6);border-top:1px solid rgba(197,160,89,0.06);border-bottom:1px solid rgba(197,160,89,0.06)}
.pdf-bar-inner{display:flex;align-items:center;gap:16px}
.pdf-bar svg{width:20px;height:20px;color:var(--gold-dim);flex-shrink:0}
.pdf-bar-label{font-family:var(--sans);font-size:0.78rem;font-weight:200;letter-spacing:0.15em;color:var(--silver)}
.pdf-bar-btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--sans);font-size:0.72rem;font-weight:300;letter-spacing:0.2em;color:var(--gold);text-decoration:none;border:1px solid rgba(197,160,89,0.15);padding:8px 22px;border-radius:4px;transition:all 0.4s var(--ease)}
.pdf-bar-btn:hover{border-color:var(--gold);background:rgba(197,160,89,0.06);transform:translateY(-1px)}
.pdf-bar-btn svg{width:14px;height:14px}
.cta-section .cta-note{font-size:0.75rem;font-weight:200;letter-spacing:0.2em;color:var(--steel)}
/* ═══ FLOATING LINE BUTTON ═══ */
.line-float{position:fixed;bottom:28px;right:28px;z-index:9998;width:60px;height:60px;background:#06C755;border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;box-shadow:0 4px 20px rgba(6,199,85,0.35);transition:all 0.4s var(--ease);opacity:0;transform:translateY(20px);animation:fadeIn 0.6s 2.5s var(--ease) forwards}
.line-float:hover{transform:translateY(-3px) scale(1.08);box-shadow:0 8px 32px rgba(6,199,85,0.45)}
.line-float svg{width:32px;height:32px}
@media(max-width:768px){.line-float{bottom:20px;right:20px;width:54px;height:54px}.line-float svg{width:28px;height:28px}}
.back-nav{display:flex;justify-content:center;padding:36px 24px}
.back-btn{display:inline-flex;align-items:center;gap:10px;font-family:var(--sans);font-size:0.78rem;font-weight:200;letter-spacing:0.25em;color:var(--gold-dim);cursor:pointer;background:none;border:1px solid rgba(197,160,89,0.08);padding:13px 30px;transition:all 0.5s var(--ease)}
.back-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(197,160,89,0.03)}
.back-btn svg{width:13px;height:13px}

/* ═══ FACILITY SHOWCASE ═══ */
.facility-section{padding:0;max-width:100%;margin:0;overflow:hidden}
.facility-header{text-align:center;padding:80px clamp(28px,5vw,90px) 48px;max-width:1200px;margin:0 auto}
.facility-header .highlights-title{margin-bottom:0}
.facility-showcase{display:grid;grid-template-columns:1fr 1fr;min-height:85vh}
@media(max-width:900px){.facility-showcase{grid-template-columns:1fr}}
.facility-image{position:relative;overflow:hidden;min-height:500px}
.facility-image img{position:absolute;inset:-4%;width:108%;height:108%;object-fit:cover;filter:brightness(0.7) saturate(0.85)}
.facility-list{display:flex;flex-direction:column;justify-content:center;padding:clamp(36px,4vw,60px) clamp(28px,4vw,56px);background:var(--navy-light);position:relative}
.facility-list::before{content:'';position:absolute;top:0;left:0;width:1px;height:100%;background:linear-gradient(180deg,transparent,var(--gold-dim),transparent)}
.fac-item{padding:24px 0;border-bottom:1px solid rgba(255,255,255,0.04);transition:all 0.4s var(--ease)}
.fac-item:last-child{border-bottom:none}
.fac-item:hover{padding-left:8px}
.fac-item .fac-label{font-family:var(--eng);font-size:0.62rem;font-weight:400;letter-spacing:0.5em;color:var(--gold-dim);margin-bottom:6px;transition:color 0.4s}
.fac-item:hover .fac-label{color:var(--gold)}
.fac-item .fac-name{font-family:var(--serif);font-size:1.1rem;font-weight:400;letter-spacing:0.08em;color:var(--off-white);margin-bottom:8px}
.fac-item .fac-desc{font-family:var(--sans);font-size:0.82rem;font-weight:200;line-height:1.9;color:var(--steel);letter-spacing:0.02em}

/* ═══ VIDEO SECTION — CINEMATIC ═══ */
.video-cinema{position:relative;padding:100px 0;background:linear-gradient(180deg,var(--navy) 0%,rgba(7,13,61,0.97) 50%,var(--navy) 100%);overflow:hidden}
.video-cinema::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(197,160,89,0.03) 0%,transparent 70%);pointer-events:none}
.video-cinema-inner{max-width:1100px;margin:0 auto;padding:0 clamp(24px,5vw,80px)}
.video-cinema-header{text-align:center;margin-bottom:48px}
.video-cinema-header .highlights-title{margin-bottom:16px}
.video-cinema-sub{font-family:var(--sans);font-size:0.82rem;font-weight:200;letter-spacing:0.1em;color:var(--steel);line-height:1.8}
.video-frame{position:relative;width:100%;aspect-ratio:16/9;border:1px solid rgba(197,160,89,0.12);background:#000;overflow:hidden}
.video-frame::before,.video-frame::after{content:'';position:absolute;width:40px;height:40px;border:1px solid rgba(197,160,89,0.2);pointer-events:none;z-index:1}
.video-frame::before{top:-1px;left:-1px;border-right:none;border-bottom:none}
.video-frame::after{bottom:-1px;right:-1px;border-left:none;border-top:none}
.video-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:none}

/* ═══ FOOTER ═══ */
.footer{text-align:center;padding:36px 24px 24px;background:var(--navy);border-top:1px solid rgba(197,160,89,0.06)}
.footer-logo{height:72px;width:auto;object-fit:contain;margin-bottom:14px;opacity:0.7}
.footer-copy{font-size:0.72rem;font-weight:200;letter-spacing:0.12em;color:rgba(200,200,210,0.2)}

/* ═══ ANIMATIONS ═══ */
@keyframes fadeIn{to{opacity:1}}
@keyframes revealUp{to{opacity:1;transform:translateY(0)}}
@keyframes scrollPulse{0%,100%{opacity:0.15}50%{opacity:0.65}}
.reveal{opacity:0;transition:opacity 1.2s var(--ease-out),transform 1.2s var(--ease-out)}
.reveal-up{transform:translateY(36px)}.reveal-left{transform:translateX(36px)}.reveal-right{transform:translateX(-36px)}
.reveal.in-view{opacity:1;transform:translate(0)}
</style>
